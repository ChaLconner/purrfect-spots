# ==============================================================================
# Purrfect Spots - CI/CD Pipeline (Production)
# ==============================================================================
# Comprehensive CI/CD workflow for the Purrfect Spots application
# Includes linting, testing, security scanning, and build verification
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, dev]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".vscode/**"
      - ".agent/**"
      - ".gemini/**"
  pull_request:
    branches: [main, develop, dev]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".vscode/**"
      - ".agent/**"
      - ".gemini/**"
  workflow_dispatch:
    inputs:
      force_full_run:
        description: "Force full pipeline run (ignore change detection)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  CACHE_VERSION: v1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


permissions:
  contents: read
  pull-requests: read
  security-events: write

# ==============================================================================
# JOBS DEFINITION
# ==============================================================================
jobs:
  # ----------------------------------------------------------------------------
  # STAGE 1: INITIALIZATION & DETECTION
  # ----------------------------------------------------------------------------
  changes:
    name: "Initialize: Detect Changes"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}
      run_backend: ${{ inputs.force_full_run == true || steps.filter.outputs.backend == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.api_spec == 'true' }}
      run_frontend: ${{ inputs.force_full_run == true || steps.filter.outputs.frontend == 'true' || steps.filter.outputs.ci == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Filter paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'api-client/**'
            frontend:
              - 'frontend/**'
            docker:
              - '**/Dockerfile'
              - 'docker-compose.yml'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'
            api_spec:
              - 'docs/openapi-baseline.json'

  # ----------------------------------------------------------------------------
  # STAGE 2: BACKEND VERIFICATION
  # ----------------------------------------------------------------------------
  backend-lint:
    name: "Backend: Lint & Format"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_backend == 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-deps: "true"
          enable-cache: "true"
      - name: Run Ruff
        run: |
          cd backend
          ruff check . --output-format=github
          ruff format --check .

  backend-typecheck:
    name: "Backend: Type Check"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_backend == 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run MyPy
        run: |
          cd backend
          mypy . --config-file pyproject.toml

  backend-test:
    name: "Backend: Unit Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_backend == 'true'
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.TEST_JWT_REFRESH_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd backend
          pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=60 -v --tb=short
      - name: Upload Report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  api-contract:
    name: "Backend: API Contract"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_backend == 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check Contract
        env:
          ENVIRONMENT: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'dummy-anon-key' }}
        run: |
          cd backend
          if [ -f "../docs/openapi-baseline.json" ]; then
            python scripts/check_api_breaking_changes.py --baseline ../docs/openapi-baseline.json
          fi
          python scripts/export_openapi.py --output ../docs/openapi-current.json
      - name: Upload Spec
        uses: actions/upload-artifact@v5
        with:
          name: openapi-specs
          path: docs/openapi-*.json

  backend-verify:
    name: "Backend: Build Verify"
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]
    if: always() && (needs.backend-lint.result == 'success' || needs.backend-lint.result == 'skipped') && (needs.backend-test.result == 'success' || needs.backend-test.result == 'skipped')
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-deps: "true"
      - name: Verify
        env:
          ENVIRONMENT: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'dummy-anon-key' }}
        run: |
          cd backend
          python -m compileall -q .
          python -c "from main import app; print('✅ FastAPI app imports successfully')"

  # ----------------------------------------------------------------------------
  # STAGE 3: FRONTEND VERIFICATION
  # ----------------------------------------------------------------------------
  frontend-check:
    name: "Frontend: Lint & Typecheck"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_frontend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Lint & Typecheck
        run: |
          npm run type-check -w frontend
          npm run lint:check -w frontend

  frontend-test:
    name: "Frontend: Unit Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_frontend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run Vitest
        run: npm run test:coverage -w frontend
      - name: Upload Coverage
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage-report
          path: frontend/coverage

  frontend-build:
    name: "Frontend: Build Bundle"
    runs-on: ubuntu-latest
    needs: [frontend-check, frontend-test]
    if: always() && (needs.frontend-check.result == 'success' || needs.frontend-check.result == 'skipped') && (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'skipped')
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Build
        run: npm run build -w frontend
      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-build
          path: frontend/dist

  # ----------------------------------------------------------------------------
  # STAGE 4: SECURITY SCANS
  # ----------------------------------------------------------------------------
  security-vuln:
    name: "Security: Trivy Scan"
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: "purrfect-spots-backend:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"
          scanners: "vuln,secret"
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          exit-code: "1"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIVY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

  security-secrets:
    name: "Security: Secret Scan"
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Pull Trufflehog Image
        run: |
          echo "📥 Pre-pulling Trufflehog image to handle transient ghcr.io timeouts..."
          for i in {1..3}; do
            docker pull ghcr.io/trufflesecurity/trufflehog:latest && break || {
              echo "::warning::Docker pull failed (attempt $i), retrying in 10s..."
              sleep 10
            }
          done
      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.94.2
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  security-sast:
    name: "Security: SAST Semgrep"
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 20
    container:
      image: semgrep/semgrep:1.99.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Semgrep
        run: |
          semgrep scan --config "p/default" --config "p/security-audit" --sarif --output semgrep.sarif .
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  security-deps:
    name: "Security: Dep Review"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Dependency Review
        uses: actions/dependency-review-action@1a7f050e4130f1d533475191c9533f86e330b621 # v4.9.0
        with:
          fail-on-severity: critical

  # ----------------------------------------------------------------------------
  # STAGE 5: FINAL GATES
  # ----------------------------------------------------------------------------
  quality-gate:
    name: "Final: Quality Gate"
    runs-on: ubuntu-latest
    needs: [backend-verify, frontend-build, security-vuln, security-secrets, backend-typecheck, api-contract, security-sast, security-deps]
    if: always()
    steps:
      - name: Check Status
        run: |
          echo "Verifying quality gate..."
          if [[ "${{ needs.backend-verify.result }}" == "failure" || "${{ needs.backend-verify.result }}" == "cancelled" || \
                "${{ needs.frontend-build.result }}" == "failure" || "${{ needs.frontend-build.result }}" == "cancelled" || \
                "${{ needs.security-vuln.result }}" == "failure" || "${{ needs.security-vuln.result }}" == "cancelled" || \
                "${{ needs.security-secrets.result }}" == "failure" || "${{ needs.security-secrets.result }}" == "cancelled" || \
                "${{ needs.backend-typecheck.result }}" == "failure" || "${{ needs.backend-typecheck.result }}" == "cancelled" || \
                "${{ needs.api-contract.result }}" == "failure" || "${{ needs.api-contract.result }}" == "cancelled" || \
                "${{ needs.security-sast.result }}" == "failure" || "${{ needs.security-sast.result }}" == "cancelled" || \
                "${{ needs.security-deps.result }}" == "failure" || "${{ needs.security-deps.result }}" == "cancelled" ]]; then
            echo "::error::Quality checks failed or were cancelled. Please review the workflow logs."
            exit 1
          fi
          echo "✅ All core checks passed or were skipped."

  summary:
    name: "Final: Summary"
    runs-on: ubuntu-latest
    needs:
      [changes, quality-gate, backend-typecheck, api-contract, security-sast]
    if: always()
    steps:
      - name: Build Summary Report
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Initialize | ${{ needs.changes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | ${{ needs.quality-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security SAST | ${{ needs.security-sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Contract | ${{ needs.api-contract.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Types | ${{ needs.backend-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
