# ==============================================================================
# Purrfect Spots - CI/CD Pipeline (Production)
# ==============================================================================
# Comprehensive CI/CD workflow for the Purrfect Spots application
# Includes linting, testing, security scanning, and build verification
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, dev]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".vscode/**"
      - ".agent/**"
      - ".gemini/**"
  pull_request:
    branches: [main, develop, dev]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".vscode/**"
      - ".agent/**"
      - ".gemini/**"
  workflow_dispatch:
    inputs:
      force_full_run:
        description: "Force full pipeline run (ignore change detection)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "24"
  CACHE_VERSION: v1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


permissions:
  contents: read
  pull-requests: read
  security-events: write

# ==============================================================================
# JOBS DEFINITION
# ==============================================================================
jobs:
  # ----------------------------------------------------------------------------
  # STAGE 1: INITIALIZATION & DETECTION
  # ----------------------------------------------------------------------------
  changes:
    name: "Initialize: Detect Changes"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      docker: ${{ steps.detect.outputs.docker }}
      ci: ${{ steps.detect.outputs.ci }}
      api_spec: ${{ steps.detect.outputs.api_spec }}
      backend_requested: ${{ inputs.force_full_run == true || steps.detect.outputs.backend == 'true' || steps.detect.outputs.ci == 'true' || steps.detect.outputs.api_spec == 'true' }}
      run_backend: ${{ inputs.force_full_run == true || steps.detect.outputs.backend == 'true' || steps.detect.outputs.ci == 'true' || steps.detect.outputs.api_spec == 'true' }}
      run_frontend: ${{ inputs.force_full_run == true || steps.detect.outputs.frontend == 'true' || steps.detect.outputs.ci == 'true' }}
      backend_runtime_checks_enabled: ${{ (inputs.force_full_run == true || steps.detect.outputs.backend == 'true' || steps.detect.outputs.ci == 'true' || steps.detect.outputs.api_spec == 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && secrets.TEST_JWT_SECRET != '' && secrets.TEST_JWT_REFRESH_SECRET != '' && secrets.DATABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
      fork_pr_limited_backend_checks: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && (inputs.force_full_run == true || steps.detect.outputs.backend == 'true' || steps.detect.outputs.ci == 'true' || steps.detect.outputs.api_spec == 'true') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          base_sha=""
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "${PR_BASE_SHA:-}" ]; then
            base_sha="$PR_BASE_SHA"
          elif [ "$EVENT_NAME" = "push" ] && [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            base_sha="$BEFORE_SHA"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            base_sha="$(git rev-parse HEAD^)"
          fi

          if [ -n "$base_sha" ] && ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$base_sha"
          fi

          if [ -n "$base_sha" ] && git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "$base_sha" "$HEAD_SHA")"
          else
            changed_files="$(git ls-files)"
          fi

          echo "Changed files:"
          printf '%s\n' "$changed_files"

          backend=false
          frontend=false
          docker=false
          ci=false
          api_spec=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              backend/*|api-client/*)
                backend=true
                ;;
            esac

            case "$file" in
              frontend/*)
                frontend=true
                ;;
            esac

            case "$file" in
              */Dockerfile|Dockerfile|docker-compose.yml)
                docker=true
                ;;
            esac

            case "$file" in
              .github/workflows/*|.github/actions/*)
                ci=true
                ;;
            esac

            case "$file" in
              docs/openapi-baseline.json)
                api_spec=true
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "docker=$docker"
            echo "ci=$ci"
            echo "api_spec=$api_spec"
          } >> "$GITHUB_OUTPUT"

  # ----------------------------------------------------------------------------
  # STAGE 2: BACKEND VERIFICATION
  # ----------------------------------------------------------------------------
  backend-lint:
    name: "Backend: Lint & Format"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_backend == 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-deps: "true"
          enable-cache: "true"
      - name: Run Ruff
        run: |
          cd backend
          ruff check . --output-format=github
          ruff format --check .

  backend-typecheck:
    name: "Backend: Type Check"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_backend == 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run MyPy
        run: |
          cd backend
          mypy . --config-file pyproject.toml

  backend-test:
    name: "Backend: Unit Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend_runtime_checks_enabled == 'true'
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.TEST_JWT_REFRESH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd backend
          pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=60 -v --tb=short
      - name: Upload Report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  api-contract:
    name: "Backend: API Contract"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend_runtime_checks_enabled == 'true'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check Contract
        env:
          ENVIRONMENT: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'dummy-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd backend
          if [ -f "../docs/openapi-baseline.json" ]; then
            python scripts/check_api_breaking_changes.py --baseline ../docs/openapi-baseline.json
          fi
          python scripts/export_openapi.py --output ../docs/openapi-current.json
      - name: Upload Spec
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: openapi-specs
          path: docs/openapi-*.json

  backend-verify:
    name: "Backend: Build Verify"
    runs-on: ubuntu-latest
    needs: [changes, backend-lint, backend-test]
    if: needs.changes.outputs.backend_runtime_checks_enabled == 'true' && needs.backend-lint.result == 'success' && needs.backend-test.result == 'success'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          install-deps: "true"
      - name: Verify
        env:
          ENVIRONMENT: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'dummy-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd backend
          python -m compileall -q .
          python -c "from main import app; print('✅ FastAPI app imports successfully')"

  # ----------------------------------------------------------------------------
  # STAGE 3: FRONTEND VERIFICATION
  # ----------------------------------------------------------------------------
  frontend-check:
    name: "Frontend: Lint & Typecheck"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_frontend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Lint & Typecheck
        run: |
          npm run type-check -w frontend
          npm run lint:check -w frontend

  frontend-test:
    name: "Frontend: Unit Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_frontend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run Vitest
        run: npm run test:coverage -w frontend
      - name: Upload Coverage
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: frontend-coverage-report
          path: frontend/coverage

  frontend-build:
    name: "Frontend: Build Bundle"
    runs-on: ubuntu-latest
    needs: [changes, frontend-check, frontend-test]
    if: needs.changes.outputs.run_frontend == 'true' && needs.frontend-check.result == 'success' && needs.frontend-test.result == 'success'
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build
        run: npm run build -w frontend
      - name: Upload Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: frontend-build
          path: frontend/dist

  # ----------------------------------------------------------------------------
  # STAGE 4: SECURITY SCANS
  # ----------------------------------------------------------------------------
  security-vuln:
    name: "Security: Trivy Scan"
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Pull Trivy image
        shell: bash
        run: |
          for i in 1 2 3; do
            if docker pull ghcr.io/aquasecurity/trivy:0.68.1; then
              exit 0
            fi
            if [ "$i" -lt 3 ]; then
              echo "::warning::Trivy image pull failed (attempt $i), retrying in 10s..."
              sleep 10
            fi
          done
          echo "::error::Unable to pull ghcr.io/aquasecurity/trivy:0.68.1 after 3 attempts."
          exit 1
      - name: Run Trivy vulnerability scanner
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/workdir" \
            -w /workdir \
            ghcr.io/aquasecurity/trivy:0.68.1 \
            fs \
            --skip-version-check \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --scanners vuln \
            --exit-code 1 \
            .
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@b56ba49b26e50535fa1e7f7db0f4f7b4bf65d80d # v3.28.10
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

  security-secrets:
    name: "Security: Secret Scan"
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
        with:
          fetch-depth: 0
      - name: Pull Trufflehog Image
        run: |
          echo "📥 Pre-pulling Trufflehog image to handle transient ghcr.io timeouts..."
          for i in {1..3}; do
            docker pull ghcr.io/trufflesecurity/trufflehog:latest && break || {
              echo "::warning::Docker pull failed (attempt $i), retrying in 10s..."
              sleep 10
            }
          done
      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@6bd2d14f7a4bc1e569fa3550efa7ec632a4fa67b # v3.94.2
        with:
          path: ./
          extra_args: --debug --only-verified

  security-sast:
    name: "Security: SAST Semgrep"
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 20
    container:
      image: semgrep/semgrep:1.99.0
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Semgrep
        run: |
          semgrep scan --config "p/default" --config "p/security-audit" --sarif --output semgrep.sarif .
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@b56ba49b26e50535fa1e7f7db0f4f7b4bf65d80d # v3.28.10
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  security-deps:
    name: "Security: Dep Review"
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efb55429cc090adc62e6ed358297f0cfee8 # v5.0.1
      - name: Dependency Review
        uses: actions/dependency-review-action@1a7f050e4130f1d533475191c9533f86e330b621 # v4.9.0
        with:
          fail-on-severity: critical

  # ----------------------------------------------------------------------------
  # STAGE 5: FINAL GATES
  # ----------------------------------------------------------------------------
  quality-gate:
    name: "Final: Quality Gate"
    runs-on: ubuntu-latest
    needs: [changes, backend-verify, frontend-build, security-vuln, security-secrets, backend-typecheck, api-contract, security-sast, security-deps]
    if: always()
    steps:
      - name: Check Status
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          BACKEND_REQUESTED: ${{ needs.changes.outputs.backend_requested }}
          RUN_BACKEND: ${{ needs.changes.outputs.run_backend }}
          RUN_FRONTEND: ${{ needs.changes.outputs.run_frontend }}
          BACKEND_RUNTIME_CHECKS_ENABLED: ${{ needs.changes.outputs.backend_runtime_checks_enabled }}
          FORK_PR_LIMITED_BACKEND_CHECKS: ${{ needs.changes.outputs.fork_pr_limited_backend_checks }}
          BACKEND_VERIFY_RESULT: ${{ needs.backend-verify.result }}
          BACKEND_TYPECHECK_RESULT: ${{ needs.backend-typecheck.result }}
          API_CONTRACT_RESULT: ${{ needs.api-contract.result }}
          FRONTEND_BUILD_RESULT: ${{ needs.frontend-build.result }}
          SECURITY_VULN_RESULT: ${{ needs.security-vuln.result }}
          SECURITY_SECRETS_RESULT: ${{ needs.security-secrets.result }}
          SECURITY_SAST_RESULT: ${{ needs.security-sast.result }}
          SECURITY_DEPS_RESULT: ${{ needs.security-deps.result }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          fail=0

          check_required_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::${name} must succeed, but its result was '${result}'."
              fail=1
            fi
          }

          check_expected_skip() {
            local name="$1"
            local result="$2"
            if [ "$result" != "skipped" ]; then
              echo "::error::${name} was expected to be skipped, but its result was '${result}'."
              fail=1
            fi
          }

          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::Change detection did not complete successfully."
            exit 1
          fi

          check_required_success "Security: Trivy Scan" "$SECURITY_VULN_RESULT"
          check_required_success "Security: Secret Scan" "$SECURITY_SECRETS_RESULT"
          check_required_success "Security: SAST Semgrep" "$SECURITY_SAST_RESULT"

          if [ "$BACKEND_REQUESTED" = "true" ]; then
            check_required_success "Backend: Type Check" "$BACKEND_TYPECHECK_RESULT"
          else
            check_expected_skip "Backend: Type Check" "$BACKEND_TYPECHECK_RESULT"
          fi

          if [ "$BACKEND_RUNTIME_CHECKS_ENABLED" = "true" ]; then
            check_required_success "Backend: Build Verify" "$BACKEND_VERIFY_RESULT"
            check_required_success "Backend: API Contract" "$API_CONTRACT_RESULT"
          else
            check_expected_skip "Backend: Build Verify" "$BACKEND_VERIFY_RESULT"
            check_expected_skip "Backend: API Contract" "$API_CONTRACT_RESULT"
          fi

          if [ "$RUN_FRONTEND" = "true" ]; then
            check_required_success "Frontend: Build Bundle" "$FRONTEND_BUILD_RESULT"
          else
            check_expected_skip "Frontend: Build Bundle" "$FRONTEND_BUILD_RESULT"
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            check_required_success "Security: Dep Review" "$SECURITY_DEPS_RESULT"
          else
            check_expected_skip "Security: Dep Review" "$SECURITY_DEPS_RESULT"
          fi

          if [ "$FORK_PR_LIMITED_BACKEND_CHECKS" = "true" ]; then
            echo "::notice::Backend runtime checks were skipped because this pull request comes from a fork and repository secrets are unavailable."
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::Quality gate failed. Review the job results above."
            exit 1
          fi

          echo "✅ Quality gate passed."

  summary:
    name: "Final: Summary"
    runs-on: ubuntu-latest
    needs:
      [changes, quality-gate, backend-typecheck, api-contract, security-sast]
    if: always()
    steps:
      - name: Build Summary Report
        env:
          FORK_PR_LIMITED_BACKEND_CHECKS: ${{ needs.changes.outputs.fork_pr_limited_backend_checks }}
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Initialize | ${{ needs.changes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | ${{ needs.quality-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security SAST | ${{ needs.security-sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Contract | ${{ needs.api-contract.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Types | ${{ needs.backend-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          if [ "$FORK_PR_LIMITED_BACKEND_CHECKS" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Note: Backend runtime checks were skipped for this forked pull request because GitHub does not expose repository secrets to fork workflows." >> $GITHUB_STEP_SUMMARY
          fi
