# ==============================================================================
# Purrfect Spots - Auto-fix Workflow
# ==============================================================================
# Automatically fixes lint and formatting issues, then commits the changes back.
#
# Triggers:
#   - Automatically: on push to the `dev` branch (when .py or .vue/.ts files change)
#   - Manually: via GitHub Actions → "Run workflow" button
# ==============================================================================

name: Auto-fix Code

on:
  # ✅ Trigger 1: Automatic — runs when code is pushed to dev
  push:
    branches: [dev]
    paths:
      - "backend/**/*.py"
      - "frontend/src/**/*.ts"
      - "frontend/src/**/*.vue"
      - "frontend/src/**/*.css"

  # ✅ Trigger 2: Manual — run from GitHub Actions UI anytime
  workflow_dispatch:
    inputs:
      scope:
        description: "Which part to auto-fix?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend-only
          - frontend-only
      dry_run:
        description: "Dry run (show what would change, do NOT commit)"
        required: false
        default: false
        type: boolean

concurrency:
  # Prevent multiple auto-fix runs from stepping on each other
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  autofix:
    name: "Auto-fix: Lint & Format"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Prevent infinite loop: skip if triggered by the bot itself
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          # On push: use the branch that was pushed
          # On workflow_dispatch: use dev branch
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so git log works for commit messages
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Backend Auto-fix (Python / Ruff)
      # -----------------------------------------------------------------------
      - name: Setup Python
        if: inputs.scope != 'frontend-only'
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2f # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Ruff
        if: inputs.scope != 'frontend-only'
        run: pip install ruff

      - name: Auto-fix Python — Ruff (lint + format)
        if: inputs.scope != 'frontend-only'
        run: |
          cd backend
          echo "🐍 Running Ruff auto-fix..."
          ruff check . --fix || true
          ruff format .
          echo "✅ Ruff done."

      # -----------------------------------------------------------------------
      # Frontend Auto-fix (TypeScript / Vue / CSS — ESLint + Prettier)
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        if: inputs.scope != 'backend-only'
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Node dependencies
        if: inputs.scope != 'backend-only'
        run: npm ci

      - name: Auto-fix Frontend — ESLint
        if: inputs.scope != 'backend-only'
        run: |
          echo "🖼️ Running ESLint auto-fix..."
          npm run lint -w frontend -- --fix || true
          echo "✅ ESLint done."

      # -----------------------------------------------------------------------
      # Detect changes & Commit (skipped in dry-run mode)
      # -----------------------------------------------------------------------
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Show diff (dry-run preview)
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run == 'true'
        run: |
          echo "🔍 DRY RUN — the following changes would be committed:"
          git diff --stat
          echo ""
          git diff

      - name: Commit and push auto-fixes
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "style: auto-fix lint and formatting issues

          Triggered by: ${{ github.event_name }} (${{ github.actor }})
          Scope: ${{ inputs.scope || 'all' }}

          Co-authored-by: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "✅ No auto-fix changes needed. Code is already clean!"

      # -----------------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------------
      - name: Write Job Summary
        if: always()
        run: |
          echo "## 🔧 Auto-fix Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | \`${{ inputs.scope || 'all (auto)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | \`${{ inputs.dry_run || 'false' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes Found | \`${{ steps.changes.outputs.changed }}\` |" >> $GITHUB_STEP_SUMMARY
