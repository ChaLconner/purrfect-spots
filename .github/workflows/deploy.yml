# ==============================================================================
# Purrfect Spots - Deployment Pipeline (Production)
# ==============================================================================
# Handles deployment to staging and production environments on Vercel
#
# Deployment Strategy:
# - Staging: Auto-deploy on push to 'dev' branch (after CI passes)
# - Production: Manual trigger or auto-deploy on push to 'main' branch
#
# Security:
# - All secrets accessed via env vars only, never in shell interpolation
# - All actions pinned to full SHA
# - Minimal permissions scope per job
#
# Prerequisites:
# - Configure repository secrets for each environment
# - Set up environment protection rules in GitHub Settings
# - Branch protection on 'main' must allow tag pushes from github-actions[bot]
# ==============================================================================

name: Deploy

on:
  # Trigger after CI/CD Pipeline completes successfully
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches: [main, dev]

  # Manual deployment trigger
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      skip_health_check:
        description: "Skip health check after deployment"
        required: false
        type: boolean
        default: false

# FIX #7: cancel-in-progress is disabled for production (main branch)
# to prevent cancelling a live smoke-test or release-tag step mid-flight.
# Staging (dev branch) still cancels eagerly so only the latest commit deploys.
concurrency:
  # FIX: github.ref in workflow_run is always the default branch (main).
  # Use head_branch from workflow_run for the actual branch; fallback to
  # github.ref for workflow_dispatch.
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: ${{ (github.event.workflow_run.head_branch || github.ref_name) != 'main' }}

# ==============================================================================
# PERMISSIONS - Principle of least privilege
# ==============================================================================
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:

  contents: read
  packages: write
  deployments: write
  id-token: write

jobs:
  # ============================================================================
  # DETERMINE DEPLOYMENT TARGET
  # ============================================================================
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.status == 'completed')
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should_deploy: ${{ steps.set-env.outputs.should_deploy }}
      version: ${{ steps.version.outputs.version }}
      start_time: ${{ steps.timer.outputs.start_time }}
      branch: ${{ steps.set-env.outputs.branch }}
    steps:
      - name: Start Timer
        id: timer
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout code
        # FIX #2: All actions pinned to full SHA — consistent with security policy
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0

      # FIX #14: reliably detect the branch name when triggered by workflow_run.
      # github.ref in workflow_run is always the default branch (main).
      # We must use github.event.workflow_run.head_branch for the actual branch.
      - name: Determine environment
        id: set-env
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ inputs.environment }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Use HEAD_BRANCH for workflow_run, otherwise use REF_NAME
          if [ "$EVENT_NAME" == "workflow_run" ]; then
            BRANCH_NAME="$HEAD_BRANCH"
          else
            BRANCH_NAME="$REF_NAME"
          fi

          echo "🔍 Detected branch: $BRANCH_NAME"
          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "environment=${INPUT_ENV}" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "$BRANCH_NAME" == "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "$BRANCH_NAME" == "dev" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate required secrets
        id: validate-secrets
        env:
          # FIX #6: Read TARGET_ENV from the output of the previous step instead
          # of re-deriving it with duplicate if/elif logic.
          TARGET_ENV: ${{ steps.set-env.outputs.environment }}
          HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
          HAS_STAGING_API_URL: ${{ secrets.STAGING_API_URL != '' || secrets.PROD_API_URL != '' }}
          HAS_PROD_API_URL: ${{ secrets.PROD_API_URL != '' }}
          HAS_SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' }}
          HAS_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY != '' }}
        run: |
          echo "🔒 Validating required secrets..."

          # Validate secrets for staging
          if [ "$TARGET_ENV" == "staging" ]; then
            if [ "$HAS_VERCEL_TOKEN" != "true" ]; then
              echo "::error::VERCEL_TOKEN is required for staging deployment"
              exit 1
            fi
            if [ "$HAS_STAGING_API_URL" != "true" ]; then
              echo "::error::STAGING_API_URL or PROD_API_URL is required for staging deployment"
              exit 1
            fi
          fi

          # Validate secrets for production
          if [ "$TARGET_ENV" == "production" ]; then
            if [ "$HAS_VERCEL_TOKEN" != "true" ]; then
              echo "::error::VERCEL_TOKEN is required for production deployment"
              exit 1
            fi
            if [ "$HAS_PROD_API_URL" != "true" ]; then
              echo "::error::PROD_API_URL is required for production deployment"
              exit 1
            fi
            if [ "$HAS_SUPABASE_URL" != "true" ]; then
              echo "::error::SUPABASE_URL is required for production deployment"
              exit 1
            fi
            if [ "$HAS_SUPABASE_KEY" != "true" ]; then
              echo "::error::SUPABASE_KEY is required for production deployment"
              exit 1
            fi
          fi

          echo "✅ Secrets validation passed"

      - name: Generate version
        id: version
        env:
          TARGET_ENV: ${{ steps.set-env.outputs.environment }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)

          if [ "$TARGET_ENV" == "production" ]; then
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION="${TAG}-${SHORT_SHA}"
          else
            VERSION="staging-${TIMESTAMP}-${SHORT_SHA}"
          fi

          # Validate version format
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-[a-f0-9]+$ ]] && [[ ! "$VERSION" =~ ^staging-[0-9]{14}-[a-f0-9]+$ ]]; then
            echo "::warning::Version format may be invalid: $VERSION"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

  # ============================================================================
  # STAGING - PARALLEL DEPLOYMENTS
  # ============================================================================
  staging-frontend:
    name: Staging - Frontend
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.environment == 'staging' }}
    timeout-minutes: 15
    # FIX #13: Expose the preview URL as a job output so staging-verify
    # can include it in the Slack / Discord notification.
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    environment:
      name: staging
      url: ${{ vars.STAGING_FRONTEND_URL }}
    steps:
      - name: Checkout code
        # FIX #2: Pinned to full SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Setup Node.js
        # FIX #12: Pinned to full SHA
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Authenticate Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel whoami --token="$VERCEL_TOKEN"

      - name: Cache API Client Node Modules
        # FIX #12: Pinned to full SHA (or tag)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: api-client/node_modules
          key: ${{ runner.os }}-api-client-${{ hashFiles('api-client/package.json') }}

      - name: Validate API Client Generation
        run: |
          echo "🧪 Validating API Client Generation..."
          if [ ! -f "api-client/package.json" ]; then
            echo "::warning::api-client/package.json not found — skipping validation."
            exit 0
          fi
          cd api-client
          [ -d node_modules ] || npm install --prefer-offline --no-audit
          # FIX: Use absolute path via $GITHUB_WORKSPACE because the Java-based
          # openapi-generator-cli cannot resolve relative paths (../) on the
          # JVM classpath inside GitHub Actions.
          npx @openapitools/openapi-generator-cli validate \
            -i "$GITHUB_WORKSPACE/docs/openapi-baseline.json"

      # FIX #5: Remove any stale .vercel directory before linking, matching the
      # pattern already used in staging-backend. Prevents wrong-project errors
      # if the repo happens to contain a committed .vercel folder.
      - name: Deploy Frontend to Vercel (Staging)
        id: deploy
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL || secrets.PROD_API_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # FIX #5: Purge any committed / cached .vercel config before linking
          rm -rf .vercel

          echo "🚀 Linking and Pulling Frontend Config..."
          vercel link --yes --token="$VERCEL_TOKEN"
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

          # Build --build-env flags using a bash array to preserve quoting
          # for values that may contain spaces, dollar signs, or special chars.
          # Targeted the repo root ('.') instead of './frontend' because the Vercel project
          # is already configured with a 'Root Directory' setting of 'frontend'.
          DEPLOY_ARGS=(deploy . --yes --token="$VERCEL_TOKEN")
          DEPLOY_ARGS+=(--build-env "VITE_SUPABASE_URL=$SUPABASE_URL")
          DEPLOY_ARGS+=(--build-env "VITE_SUPABASE_ANON_KEY=$SUPABASE_KEY")
          [ -n "$STAGING_API_URL" ] && DEPLOY_ARGS+=(--build-env "VITE_API_BASE_URL=$STAGING_API_URL")
          [ -n "$GOOGLE_MAPS_API_KEY" ] && DEPLOY_ARGS+=(--build-env "VITE_GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY")

          echo "🚀 Deploying Frontend..."
          # FIX #13: Capture the deployment URL for downstream notification
          DEPLOY_OUTPUT=$(vercel "${DEPLOY_ARGS[@]}")
          URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)
          echo "deployment_url=${URL}" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: ${URL}"

      - name: Create Sentry Release (Staging)
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::notice::SENTRY_AUTH_TOKEN not set — skipping Sentry release"
            exit 0
          fi
          npm install -g @sentry/cli --silent
          echo "📦 Creating Sentry release: ${VERSION} (staging)"
          sentry-cli releases new "${VERSION}" \
            --org="$SENTRY_ORG" \
            --project="$SENTRY_PROJECT"
          sentry-cli releases set-commits "${VERSION}" \
            --auto \
            --org="$SENTRY_ORG" \
            --project="$SENTRY_PROJECT"
          sentry-cli releases deploys "${VERSION}" new \
            --env staging \
            --org="$SENTRY_ORG" \
            --project="$SENTRY_PROJECT"
          sentry-cli releases finalize "${VERSION}" \
            --org="$SENTRY_ORG" \
            --project="$SENTRY_PROJECT"
          echo "✅ Sentry staging release created: ${VERSION}"

  staging-backend:
    name: Staging - Backend
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.environment == 'staging' }}
    timeout-minutes: 15
    environment:
      name: staging
    steps:
      - name: Checkout code
        # FIX #2: Pinned to full SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - name: Setup Node.js
        # FIX #12: Pinned to full SHA
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Authenticate Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel whoami --token="$VERCEL_TOKEN"

      - name: Deploy Backend to Vercel (Staging)
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch }}
        run: |
          echo "🚀 Linking and Pulling Backend Config..."
          rm -rf .vercel
          vercel link --yes --token="$VERCEL_TOKEN"
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

          echo "🚀 Deploying Backend..."
          DEPLOY_ARGS=(deploy . --yes --token="$VERCEL_TOKEN")
          [ -n "$SUPABASE_URL" ] && DEPLOY_ARGS+=(-e "SUPABASE_URL=$SUPABASE_URL")
          [ -n "$SUPABASE_KEY" ] && DEPLOY_ARGS+=(-e "SUPABASE_KEY=$SUPABASE_KEY")
          
          # Targeted the repo root ('.') instead of './backend' because the Vercel project
          # is already configured with a 'Root Directory' setting of 'backend'.
          vercel "${DEPLOY_ARGS[@]}"

  staging-verify:
    name: Staging - Verification
    runs-on: ubuntu-latest
    needs: [prepare, staging-frontend, staging-backend]
    if: ${{ always() && needs.prepare.outputs.environment == 'staging' }}
    timeout-minutes: 10
    steps:
      # FIX #8: Replace single curl with a retry loop.
      # Vercel preview deployments can take >10 s to cold-start; 5 × 10 s
      # retries give a 50 s window before the health check is declared failed.
      - name: Staging Health Check
        if: inputs.skip_health_check != true && needs.staging-frontend.result == 'success' && needs.staging-backend.result == 'success'
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL || secrets.PROD_API_URL }}
        run: |
          echo "🏥 Running staging health check..."
          MAX_ATTEMPTS=5
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i / $MAX_ATTEMPTS..."
            curl -sf --max-time 15 "${STAGING_API_URL}/health/ready" && {
              echo "✅ Staging Backend is Healthy"
              exit 0
            }
            [ "$i" -lt "$MAX_ATTEMPTS" ] && echo "Not ready yet, retrying in 10s..." && sleep 10
          done
          echo "❌ Staging Health Check Failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Notify Staging Result
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FE_RESULT: ${{ needs.staging-frontend.result }}
          BE_RESULT: ${{ needs.staging-backend.result }}
          VERSION: ${{ needs.prepare.outputs.version }}
          # FIX #13: Frontend URL is now available from staging-frontend output
          FRONTEND_URL: ${{ needs.staging-frontend.outputs.deployment_url }}
        run: |
          if [ "$FE_RESULT" == "success" ] && [ "$BE_RESULT" == "success" ]; then
            TITLE="✅ Staging Deployment Successful"
            COLOR_SLACK="good"
            COLOR_DISCORD=5763719
          else
            TITLE="❌ Staging Deployment Failed"
            COLOR_SLACK="danger"
            COLOR_DISCORD=15548997
          fi

          [ -n "$SLACK_WEBHOOK_URL" ] && curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"${TITLE}\", \"attachments\": [{\"color\": \"${COLOR_SLACK}\", \"fields\": [{\"title\": \"Environment\", \"value\": \"Staging\", \"short\": true}, {\"title\": \"Version\", \"value\": \"${VERSION}\", \"short\": true}, {\"title\": \"URL\", \"value\": \"${FRONTEND_URL}\", \"short\": false}]}]}" \
            2>/dev/null || true
          [ -n "$DISCORD_WEBHOOK_URL" ] && curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"${TITLE}\", \"color\": ${COLOR_DISCORD}, \"fields\": [{\"name\": \"Environment\", \"value\": \"Staging\"}, {\"name\": \"Version\", \"value\": \"${VERSION}\"}, {\"name\": \"URL\", \"value\": \"${FRONTEND_URL}\"}]}]}" \
            2>/dev/null || true
          echo "Notifying: $TITLE"

  # ============================================================================
  # PRODUCTION - MODULAR FLOW
  # ============================================================================
  production-backup:
    name: Production - Backup
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.environment == 'production' }}
    timeout-minutes: 10
    steps:
      - name: Pre-deployment backup
        env:
          BACKUP_WEBHOOK_URL: ${{ secrets.BACKUP_WEBHOOK_URL }}
          BACKUP_API_KEY: ${{ secrets.BACKUP_API_KEY }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "💾 Creating pre-deployment backup..."
          if [ -n "$BACKUP_WEBHOOK_URL" ]; then
            curl -X POST "$BACKUP_WEBHOOK_URL" \
              -H "Authorization: Bearer $BACKUP_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"type\": \"pre-deployment\", \"version\": \"${VERSION}\"}"
          fi

  production-frontend:
    name: Production - Frontend
    runs-on: ubuntu-latest
    needs: [prepare, production-backup]
    if: ${{ needs.prepare.outputs.environment == 'production' }}
    timeout-minutes: 15
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    environment:
      name: production
      url: https://purrfect-spots.vercel.app
      # Require manual approval for production deployments
      # Configure in GitHub Settings > Environments > production > Protection rules
    steps:
      - name: Checkout code
        # FIX #2: Pinned to full SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - name: Setup Node.js
        # FIX #12: Pinned to full SHA
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with: { node-version: "22", cache: "npm" }
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Authenticate Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel whoami --token="$VERCEL_TOKEN"
      - id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          # FIX #5: Purge stale .vercel config before linking
          rm -rf .vercel

          echo "🚀 Linking and Pulling Frontend Production Config..."
          vercel link --yes --token="$VERCEL_TOKEN"
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

          # Build --build-env flags using a bash array to preserve quoting
          # Targeted the repo root ('.') instead of './frontend' because the Vercel project
          # is already configured with a 'Root Directory' setting of 'frontend'.
          DEPLOY_ARGS=(deploy . --prod --yes --token="$VERCEL_TOKEN")
          DEPLOY_ARGS+=(--build-env "VITE_SUPABASE_URL=$SUPABASE_URL")
          DEPLOY_ARGS+=(--build-env "VITE_SUPABASE_ANON_KEY=$SUPABASE_KEY")
          [ -n "$PROD_API_URL" ] && DEPLOY_ARGS+=(--build-env "VITE_API_BASE_URL=$PROD_API_URL")
          [ -n "$GOOGLE_MAPS_API_KEY" ] && DEPLOY_ARGS+=(--build-env "VITE_GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY")

          echo "🚀 Triggering Vercel Production Deployment..."
          DEPLOY_OUTPUT=$(vercel "${DEPLOY_ARGS[@]}")
          URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)
          echo "deployment_url=${URL}" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: ${URL}"

      - name: Create Sentry Release (Production)
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::notice::SENTRY_AUTH_TOKEN not set — skipping Sentry release"
            exit 0
          fi
          npm install -g @sentry/cli --silent
          echo "📦 Creating Sentry release: ${VERSION} (production)"
          sentry-cli releases new "${VERSION}" \
            --org="$SENTRY_ORG" \
            --project="$SENTRY_PROJECT"
          sentry-cli releases set-commits "${VERSION}" \
            --auto \
            --org="$SENTRY_ORG" \
            --project="$SENTRY_PROJECT"
          sentry-cli releases deploys "${VERSION}" new \
            --env production \
            --org="$SENTRY_ORG" \
            --project="$SENTRY_PROJECT"
          sentry-cli releases finalize "${VERSION}" \
            --org="$SENTRY_ORG" \
            --project="$SENTRY_PROJECT"
          echo "✅ Sentry production release created: ${VERSION}"

  production-backend:
    name: Production - Backend
    runs-on: ubuntu-latest
    needs: [prepare, production-backup]
    if: ${{ needs.prepare.outputs.environment == 'production' }}
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Checkout code
        # FIX #2: Pinned to full SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - name: Setup Node.js
        # FIX #12: Pinned to full SHA
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with: { node-version: "22", cache: "npm" }
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Authenticate Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel whoami --token="$VERCEL_TOKEN"
      - name: Deploy Backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          # FIX #10: Backend explicitly uses VERCEL_BACKEND_PROJECT_ID, not the
          # shared VERCEL_PROJECT_ID, so the correct project is always targeted.
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🚀 Linking and Pulling Backend Production Config..."
          rm -rf .vercel
          vercel link --yes --token="$VERCEL_TOKEN"
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

          echo "🚀 Triggering Backend Deployment..."
          DEPLOY_ARGS=(deploy . --prod --yes --token="$VERCEL_TOKEN")
          [ -n "$SUPABASE_URL" ] && DEPLOY_ARGS+=(-e "SUPABASE_URL=$SUPABASE_URL")
          [ -n "$SUPABASE_KEY" ] && DEPLOY_ARGS+=(-e "SUPABASE_KEY=$SUPABASE_KEY")
          
          # Targeted the repo root ('.') instead of './backend' because the Vercel project
          # is already configured with a 'Root Directory' setting of 'backend'.
          vercel "${DEPLOY_ARGS[@]}"

  production-verify:
    name: Production - Verification
    runs-on: ubuntu-latest
    needs: [prepare, production-frontend, production-backend]
    if: ${{ always() && needs.prepare.outputs.environment == 'production' }}
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        # Need repo access for tagging
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        # Need node for Vercel CLI (which is used in rollback)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # jq is pre-installed on ubuntu-latest runners — no manual install needed.

      - name: Smoke Tests
        if: needs.production-frontend.result == 'success' && needs.production-backend.result == 'success'
        env:
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          # PROD_FRONTEND_URL is the stable canonical alias (e.g. https://purrfect-spots.vercel.app).
          # This avoids hitting a unique deployment URL which has Vercel Deployment Protection
          # enabled and returns HTTP 401. Use vars.PROD_FRONTEND_URL (a GitHub Actions variable)
          # as the primary target, and fall back to the dynamic deployment URL only if unset.
          PROD_FRONTEND_URL: ${{ vars.PROD_FRONTEND_URL }}
          DEPLOYMENT_URL: ${{ needs.production-frontend.outputs.deployment_url }}
          # Optional: Vercel Deployment Protection bypass secret (set in GitHub Secrets).
          # Allows the smoke test to access unique deployment URLs protected by Vercel.
          # Generate via: Vercel Dashboard > Project > Settings > Deployment Protection.
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        run: |
          echo "🧪 Running Production Smoke Tests..."
          echo ""

          FAILED=0

          # --- Backend Health Check ---
          echo "=== Backend Health Check ==="
          MAX_ATTEMPTS=5
          BACKEND_OK=false
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i / $MAX_ATTEMPTS..."
            START_MS=$(date +%s%3N)
            if curl -sf --max-time 15 "${PROD_API_URL}/health/ready"; then
              END_MS=$(date +%s%3N)
              RESPONSE_TIME=$((END_MS - START_MS))
              echo ""
              echo "✅ Backend is healthy (${RESPONSE_TIME}ms)"

              # Response time assertion
              if [ "$RESPONSE_TIME" -gt 5000 ]; then
                echo "::warning::Backend response time ${RESPONSE_TIME}ms exceeds 5000ms threshold"
              fi
              BACKEND_OK=true
              break
            fi
            [ "$i" -lt "$MAX_ATTEMPTS" ] && echo "Not ready yet, retrying in 15s..." && sleep 15
          done

          if [ "$BACKEND_OK" != "true" ]; then
            echo "❌ Backend health check failed after $MAX_ATTEMPTS attempts"
            FAILED=1
          fi

          echo ""

          # --- Frontend Health Check ---
          # Prefer the stable canonical URL (set via vars.PROD_FRONTEND_URL) over the
          # unique deployment URL to avoid Vercel Deployment Protection (HTTP 401).
          echo "=== Frontend Health Check ==="
          FRONTEND_URL="${PROD_FRONTEND_URL:-$DEPLOYMENT_URL}"
          if [ -n "$FRONTEND_URL" ]; then
            echo "🔗 Checking: ${FRONTEND_URL}"
            MAX_ATTEMPTS=3
            FRONTEND_OK=false
            # Build curl args. If a protection bypass secret is configured, include
            # the x-vercel-protection-bypass header so Vercel lets the request
            # through even on unique deployment URLs with protection enabled.
            CURL_ARGS=(-s -o /dev/null -w "%{http_code}" --max-time 15)
            [ -n "$VERCEL_PROTECTION_BYPASS" ] && CURL_ARGS+=(-H "x-vercel-protection-bypass: $VERCEL_PROTECTION_BYPASS")
            for i in $(seq 1 $MAX_ATTEMPTS); do
              echo "Attempt $i / $MAX_ATTEMPTS..."
              HTTP_STATUS=$(curl "${CURL_ARGS[@]}" "${FRONTEND_URL}")
              if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
                echo "✅ Frontend is accessible (HTTP $HTTP_STATUS)"
                FRONTEND_OK=true
                break
              fi
              [ "$i" -lt "$MAX_ATTEMPTS" ] && echo "HTTP $HTTP_STATUS — retrying in 10s..." && sleep 10
            done

            if [ "$FRONTEND_OK" != "true" ]; then
              echo "❌ Frontend health check failed (last HTTP status: $HTTP_STATUS)"
              FAILED=1
            fi
          else
            echo "::warning::Frontend URL not available — skipping frontend health check"
          fi

          echo ""
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Smoke tests FAILED"
            exit 1
          else
            echo "✅ All smoke tests PASSED"
          fi

      - name: Create Release Tag
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "🏷️ Creating release tag..."

          TAG_NAME="release-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "${TAG_NAME}" -m "Production release ${VERSION}"
          git push origin "${TAG_NAME}"

          gh release create "${TAG_NAME}" \
            --title "Release ${VERSION}" \
            --notes "Automated production release

          - Version: ${VERSION}
          - Deployed by: ${{ github.actor }}
          - Commit: ${{ github.sha }}" \
            --latest

          echo "✅ Release tag ${TAG_NAME} created and pushed"

      - name: Rollback on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERSION: ${{ needs.prepare.outputs.version }}
          # FIX #10: Both project IDs are explicitly present so each rollback
          # targets the correct Vercel project independently.
          VERCEL_FRONTEND_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_BACKEND_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          echo "🔄 Initiating rollback..."

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --exclude="release-${VERSION}" 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Rolling back to $PREVIOUS_TAG"

            # FIX #3: Each rollback now targets its own project explicitly via
            # VERCEL_PROJECT_ID env var instead of the unsupported --project flag.
            echo "Rolling back frontend..."
            VERCEL_PROJECT_ID="$VERCEL_FRONTEND_PROJECT_ID" vercel rollback \
              --yes \
              --token="$VERCEL_TOKEN" \
              || echo "::warning::Frontend rollback failed"

            if [ -n "$VERCEL_BACKEND_PROJECT_ID" ]; then
              echo "Rolling back backend..."
              VERCEL_PROJECT_ID="$VERCEL_BACKEND_PROJECT_ID" vercel rollback \
                --yes \
                --token="$VERCEL_TOKEN" \
                || echo "::warning::Backend rollback failed"
            fi

            echo "✅ Rollback completed"
          else
            echo "::warning::No previous tag found for rollback – this appears to be the first deployment."
            echo "ℹ️ Manual intervention may be needed. Check the deployment dashboard."
          fi

      - name: Notify Deployment Result
        if: always()
        env:
          # FIX #4: Was incorrectly reading from steps.deploy-frontend (a step
          # that does not exist in this job). Now reads from the correct
          # needs.production-frontend job output.
          FRONTEND_URL: ${{ needs.production-frontend.outputs.deployment_url }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" == "success" ]; then
            echo "✅ Production deployment successful!"
            echo "🔗 URL: ${FRONTEND_URL}"
            echo "📦 Version: ${VERSION}"
            COLOR_SLACK="good"
            COLOR_DISCORD=5763719
            TITLE="✅ Production Deployment Successful"
          else
            echo "❌ Production deployment failed!"
            echo "🔄 Rollback initiated automatically."
            COLOR_SLACK="danger"
            COLOR_DISCORD=15548997
            TITLE="❌ Production Deployment Failed - Rollback Initiated"
          fi

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"${TITLE}\",
                \"attachments\": [{
                  \"color\": \"${COLOR_SLACK}\",
                  \"fields\": [
                    {\"title\": \"Environment\", \"value\": \"Production\", \"short\": true},
                    {\"title\": \"Version\", \"value\": \"${VERSION}\", \"short\": true},
                    {\"title\": \"URL\", \"value\": \"${FRONTEND_URL}\", \"short\": false},
                    {\"title\": \"Deployed by\", \"value\": \"${{ github.actor }}\", \"short\": true},
                    {\"title\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                  ]
                }]
              }" 2>/dev/null || echo "Slack notification failed"
          fi

          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"${TITLE}\",
                  \"color\": ${COLOR_DISCORD},
                  \"fields\": [
                    {\"name\": \"Environment\", \"value\": \"Production\", \"inline\": true},
                    {\"name\": \"Version\", \"value\": \"${VERSION}\", \"inline\": true},
                    {\"name\": \"URL\", \"value\": \"${FRONTEND_URL}\"},
                    {\"name\": \"Deployed by\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                    {\"name\": \"Run\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}
                  ]
                }]
              }" 2>/dev/null || echo "Discord notification failed"
          fi

  # ============================================================================
  # DEPLOYMENT SUMMARY
  # FIX #9: summary no longer depends on both staging-verify AND production-verify.
  # Only the relevant verify job for the current environment is waited on, which
  # prevents a production run from blocking on a skipped staging job (and vice
  # versa). The 'always()' guard ensures the summary still runs on failures.
  # ============================================================================
  summary-staging:
    name: Deployment Summary (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [prepare, staging-frontend, staging-verify]
    if: ${{ always() && needs.prepare.outputs.environment == 'staging' && needs.prepare.outputs.should_deploy == 'true' }}
    steps:
      - name: Create staging deployment summary
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          FRONTEND_URL: ${{ needs.staging-frontend.outputs.deployment_url }}
          STAGING_RESULT: ${{ needs.staging-verify.result }}
          START_TIME: ${{ needs.prepare.outputs.start_time }}
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | staging |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${FRONTEND_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Staging Deployment" >> $GITHUB_STEP_SUMMARY
          STATUS="❌ Failed"
          [ "${STAGING_RESULT}" == "success" ] && STATUS="✅ Success"
          [ "${STAGING_RESULT}" == "skipped" ] && STATUS="⏭️ Skipped"
          echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Deployment Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run ID**: \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run Number**: \`${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$START_TIME" ] && [ "$START_TIME" != "null" ]; then
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            if [ $DURATION -gt 0 ]; then
              MINUTES=$((DURATION / 60))
              SECONDS=$((DURATION % 60))
              echo "- **Deployment Duration**: ${MINUTES}m ${SECONDS}s" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  summary-production:
    name: Deployment Summary (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [prepare, production-frontend, production-verify]
    if: ${{ always() && needs.prepare.outputs.environment == 'production' && needs.prepare.outputs.should_deploy == 'true' }}
    steps:
      - name: Create production deployment summary
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          FRONTEND_URL: ${{ needs.production-frontend.outputs.deployment_url }}
          PRODUCTION_RESULT: ${{ needs.production-verify.result }}
          START_TIME: ${{ needs.prepare.outputs.start_time }}
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | production |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${FRONTEND_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Production Deployment" >> $GITHUB_STEP_SUMMARY
          STATUS="❌ Failed"
          [ "${PRODUCTION_RESULT}" == "success" ] && STATUS="✅ Success"
          [ "${PRODUCTION_RESULT}" == "skipped" ] && STATUS="⏭️ Skipped"
          echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Deployment Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run ID**: \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run Number**: \`${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$START_TIME" ] && [ "$START_TIME" != "null" ]; then
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            if [ $DURATION -gt 0 ]; then
              MINUTES=$((DURATION / 60))
              SECONDS=$((DURATION % 60))
              echo "- **Deployment Duration**: ${MINUTES}m ${SECONDS}s" >> $GITHUB_STEP_SUMMARY
            fi
          fi
