name: Deploy

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches: [main, dev]

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      skip_health_check:
        description: "Skip health check after deployment"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: ${{ (github.event.workflow_run.head_branch || github.ref_name) != 'main' }}

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  VERCEL_CLI_VERSION: "47.0.5"

defaults:
  run:
    shell: bash

jobs:
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.status == 'completed' &&
       github.event.workflow_run.event == 'push')
    outputs:
      environment: ${{ steps.meta.outputs.environment }}
      should_deploy: ${{ steps.meta.outputs.should_deploy }}
      version: ${{ steps.version.outputs.version }}
      start_time: ${{ steps.timer.outputs.start_time }}
      branch: ${{ steps.meta.outputs.branch }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
      source_run_url: ${{ steps.meta.outputs.source_run_url }}
      skip_health_check: ${{ steps.meta.outputs.skip_health_check }}
    steps:
      - name: Start timer
        id: timer
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Resolve deployment metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ inputs.environment }}
          INPUT_SKIP_HEALTH_CHECK: ${{ inputs.skip_health_check }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REF_NAME: ${{ github.ref_name }}
          CURRENT_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            SOURCE_BRANCH="$HEAD_BRANCH"
            SOURCE_SHA="$HEAD_SHA"
            SKIP_HEALTH_CHECK=false
            SOURCE_RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${WORKFLOW_RUN_ID}"
          else
            SOURCE_BRANCH="$REF_NAME"
            SOURCE_SHA="$CURRENT_SHA"
            SKIP_HEALTH_CHECK="$INPUT_SKIP_HEALTH_CHECK"
            SOURCE_RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${CURRENT_RUN_ID}"
          fi

          if [ -z "${SOURCE_BRANCH:-}" ] || [ -z "${SOURCE_SHA:-}" ]; then
            echo "::error::Unable to resolve the source branch or commit for deployment."
            exit 1
          fi

          TARGET_ENV=none
          SHOULD_DEPLOY=false

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET_ENV="$INPUT_ENV"
            SHOULD_DEPLOY=true

            if [ "$TARGET_ENV" = "production" ] && [ "$SOURCE_BRANCH" != "main" ]; then
              echo "::error::Manual production deployments must run from the main branch."
              exit 1
            fi

            if [ "$TARGET_ENV" = "staging" ] && [ "$SOURCE_BRANCH" != "dev" ]; then
              echo "::error::Manual staging deployments must run from the dev branch."
              exit 1
            fi
          elif [ "$SOURCE_BRANCH" = "main" ]; then
            TARGET_ENV=production
            SHOULD_DEPLOY=true
          elif [ "$SOURCE_BRANCH" = "dev" ]; then
            TARGET_ENV=staging
            SHOULD_DEPLOY=true
          fi

          echo "branch=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "environment=${TARGET_ENV}" >> "$GITHUB_OUTPUT"
          echo "should_deploy=${SHOULD_DEPLOY}" >> "$GITHUB_OUTPUT"
          echo "source_run_url=${SOURCE_RUN_URL}" >> "$GITHUB_OUTPUT"
          echo "skip_health_check=${SKIP_HEALTH_CHECK}" >> "$GITHUB_OUTPUT"

      - name: Checkout source revision
        if: ${{ steps.meta.outputs.should_deploy == 'true' }}
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ steps.meta.outputs.source_sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Generate version
        if: ${{ steps.meta.outputs.should_deploy == 'true' }}
        id: version
        env:
          TARGET_ENV: ${{ steps.meta.outputs.environment }}
        run: |
          set -euo pipefail

          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)

          if [ "$TARGET_ENV" = "production" ]; then
            VERSION="production-${TIMESTAMP}-${SHORT_SHA}"
          else
            VERSION="staging-${TIMESTAMP}-${SHORT_SHA}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version ${VERSION}"

  staging-frontend:
    name: Staging - Frontend
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.environment == 'staging' && needs.prepare.outputs.should_deploy == 'true' }}
    timeout-minutes: 15
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    environment:
      name: staging
      url: ${{ vars.STAGING_FRONTEND_URL }}
    steps:
      - name: Checkout source revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate staging frontend configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -euo pipefail
          required_vars=(
            VERCEL_TOKEN
            VERCEL_ORG_ID
            VERCEL_PROJECT_ID
            STAGING_API_URL
            SUPABASE_URL
            SUPABASE_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::${var_name} is required for the staging frontend deployment."
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@a0853c245d4dbd38b7f14a2ab0dcbda9a941144d # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g "vercel@${VERCEL_CLI_VERSION}"

      - name: Authenticate Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel whoami --token="$VERCEL_TOKEN"

      - name: Cache API client node_modules
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.0
        with:
          path: api-client/node_modules
          key: ${{ runner.os }}-api-client-${{ hashFiles('api-client/package.json') }}

      - name: Validate API client generation
        run: |
          set -euo pipefail

          if [ ! -f "api-client/package.json" ]; then
            echo "::notice::api-client/package.json not found; skipping OpenAPI validation."
            exit 0
          fi

          cd api-client
          [ -d node_modules ] || npm install --prefer-offline --no-audit
          npx @openapitools/openapi-generator-cli validate \
            -i "$GITHUB_WORKSPACE/docs/openapi-baseline.json"

      - name: Deploy frontend to Vercel (staging)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -euo pipefail

          rm -rf .vercel

          vercel link --yes --token="$VERCEL_TOKEN"
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

          DEPLOY_ARGS=(deploy . --yes --token="$VERCEL_TOKEN")
          DEPLOY_ARGS+=(--build-env "VITE_SUPABASE_URL=$SUPABASE_URL")
          DEPLOY_ARGS+=(--build-env "VITE_SUPABASE_ANON_KEY=$SUPABASE_KEY")
          DEPLOY_ARGS+=(--build-env "VITE_API_BASE_URL=$STAGING_API_URL")
          [ -n "$GOOGLE_MAPS_API_KEY" ] && DEPLOY_ARGS+=(--build-env "VITE_GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY")

          DEPLOY_OUTPUT=$(vercel "${DEPLOY_ARGS[@]}")
          URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)

          if [ -z "${URL:-}" ]; then
            echo "::error::Unable to determine the staging frontend deployment URL."
            exit 1
          fi

          echo "deployment_url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Staging frontend deployed to ${URL}"

      - name: Create Sentry release (staging)
        if: success()
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          if [ -z "${SENTRY_AUTH_TOKEN:-}" ] || [ -z "${SENTRY_ORG:-}" ] || [ -z "${SENTRY_PROJECT:-}" ]; then
            echo "::notice::Sentry release configuration is incomplete; skipping release creation."
            exit 0
          fi

          npm install -g @sentry/cli --silent
          sentry-cli releases new "${VERSION}" --org="$SENTRY_ORG" --project="$SENTRY_PROJECT"
          sentry-cli releases set-commits "${VERSION}" --auto --org="$SENTRY_ORG" --project="$SENTRY_PROJECT"
          sentry-cli releases deploys "${VERSION}" new --env staging --org="$SENTRY_ORG" --project="$SENTRY_PROJECT"
          sentry-cli releases finalize "${VERSION}" --org="$SENTRY_ORG" --project="$SENTRY_PROJECT"

  staging-backend:
    name: Staging - Backend
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.environment == 'staging' && needs.prepare.outputs.should_deploy == 'true' }}
    timeout-minutes: 15
    environment:
      name: staging
    steps:
      - name: Checkout source revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate staging backend configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_BACKEND_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          required_vars=(
            VERCEL_TOKEN
            VERCEL_ORG_ID
            VERCEL_BACKEND_PROJECT_ID
            DATABASE_URL
            SUPABASE_URL
            SUPABASE_KEY
            SUPABASE_SERVICE_ROLE_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::${var_name} is required for the staging backend deployment."
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@a0853c245d4dbd38b7f14a2ab0dcbda9a941144d # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g "vercel@${VERCEL_CLI_VERSION}"

      - name: Authenticate Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel whoami --token="$VERCEL_TOKEN"

      - name: Deploy backend to Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          rm -rf .vercel
          vercel link --yes --token="$VERCEL_TOKEN"
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

          DEPLOY_ARGS=(deploy . --yes --token="$VERCEL_TOKEN")
          DEPLOY_ARGS+=(-e "DATABASE_URL=$DATABASE_URL")
          DEPLOY_ARGS+=(-e "SUPABASE_URL=$SUPABASE_URL")
          DEPLOY_ARGS+=(-e "SUPABASE_KEY=$SUPABASE_KEY")
          DEPLOY_ARGS+=(-e "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY")

          vercel "${DEPLOY_ARGS[@]}"

  staging-verify:
    name: Staging - Verification
    runs-on: ubuntu-latest
    needs: [prepare, staging-frontend, staging-backend]
    if: ${{ always() && needs.prepare.outputs.environment == 'staging' && needs.prepare.outputs.should_deploy == 'true' }}
    timeout-minutes: 10
    environment:
      name: staging
    steps:
      - name: Fail when a staging deployment job fails
        if: ${{ needs.staging-frontend.result != 'success' || needs.staging-backend.result != 'success' }}
        run: |
          echo "::error::At least one staging deployment job failed."
          exit 1

      - name: Staging health check
        if: ${{ needs.prepare.outputs.skip_health_check != 'true' && needs.staging-frontend.result == 'success' && needs.staging-backend.result == 'success' }}
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          set -euo pipefail

          if [ -z "${STAGING_API_URL:-}" ]; then
            echo "::error::STAGING_API_URL is required for the staging health check."
            exit 1
          fi

          MAX_ATTEMPTS=5
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Health check attempt ${i}/${MAX_ATTEMPTS}"
            if curl --fail --show-error --silent --max-time 15 "${STAGING_API_URL}/health/ready"; then
              echo "Staging backend is healthy"
              exit 0
            fi
            [ "$i" -lt "$MAX_ATTEMPTS" ] && sleep 10
          done

          echo "::error::Staging health check failed after ${MAX_ATTEMPTS} attempts."
          exit 1

      - name: Notify staging result
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.prepare.outputs.version }}
          FRONTEND_URL: ${{ needs.staging-frontend.outputs.deployment_url }}
          JOB_STATUS: ${{ job.status }}
          SOURCE_BRANCH: ${{ needs.prepare.outputs.branch }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        run: |
          set +e

          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="Staging deployment successful"
            COLOR_SLACK="good"
            COLOR_DISCORD=5763719
          else
            TITLE="Staging deployment failed"
            COLOR_SLACK="danger"
            COLOR_DISCORD=15548997
          fi

          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"${TITLE}\",\"attachments\":[{\"color\":\"${COLOR_SLACK}\",\"fields\":[{\"title\":\"Environment\",\"value\":\"staging\",\"short\":true},{\"title\":\"Version\",\"value\":\"${VERSION}\",\"short\":true},{\"title\":\"Branch\",\"value\":\"${SOURCE_BRANCH}\",\"short\":true},{\"title\":\"Commit\",\"value\":\"${SOURCE_SHA}\",\"short\":false},{\"title\":\"URL\",\"value\":\"${FRONTEND_URL}\",\"short\":false}]}]}" \
              >/dev/null 2>&1 || true
          fi

          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            curl -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"${TITLE}\",\"color\":${COLOR_DISCORD},\"fields\":[{\"name\":\"Environment\",\"value\":\"staging\",\"inline\":true},{\"name\":\"Version\",\"value\":\"${VERSION}\",\"inline\":true},{\"name\":\"Branch\",\"value\":\"${SOURCE_BRANCH}\",\"inline\":true},{\"name\":\"Commit\",\"value\":\"${SOURCE_SHA}\"},{\"name\":\"URL\",\"value\":\"${FRONTEND_URL}\"}]}]}" \
              >/dev/null 2>&1 || true
          fi

  production-backup:
    name: Production - Backup
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.environment == 'production' && needs.prepare.outputs.should_deploy == 'true' }}
    timeout-minutes: 10
    environment:
      name: production
    steps:
      - name: Pre-deployment backup
        env:
          BACKUP_WEBHOOK_URL: ${{ secrets.BACKUP_WEBHOOK_URL }}
          BACKUP_API_KEY: ${{ secrets.BACKUP_API_KEY }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        run: |
          set -euo pipefail

          if [ -z "${BACKUP_WEBHOOK_URL:-}" ]; then
            echo "::notice::BACKUP_WEBHOOK_URL is not configured; skipping backup hook."
            exit 0
          fi

          if [ -z "${BACKUP_API_KEY:-}" ]; then
            echo "::error::BACKUP_API_KEY is required when BACKUP_WEBHOOK_URL is configured."
            exit 1
          fi

          curl --fail --show-error --silent -X POST "$BACKUP_WEBHOOK_URL" \
            -H "Authorization: Bearer $BACKUP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"pre-deployment\",\"version\":\"${VERSION}\",\"source_sha\":\"${SOURCE_SHA}\"}"

  production-frontend:
    name: Production - Frontend
    runs-on: ubuntu-latest
    needs: [prepare, production-backup]
    if: ${{ needs.prepare.outputs.environment == 'production' && needs.prepare.outputs.should_deploy == 'true' }}
    timeout-minutes: 15
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    environment:
      name: production
      url: ${{ vars.PROD_FRONTEND_URL || 'https://purrfect-spots.vercel.app' }}
    steps:
      - name: Checkout source revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate production frontend configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -euo pipefail
          required_vars=(
            VERCEL_TOKEN
            VERCEL_ORG_ID
            VERCEL_PROJECT_ID
            PROD_API_URL
            SUPABASE_URL
            SUPABASE_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::${var_name} is required for the production frontend deployment."
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@a0853c245d4dbd38b7f14a2ab0dcbda9a941144d # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g "vercel@${VERCEL_CLI_VERSION}"

      - name: Authenticate Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel whoami --token="$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          set -euo pipefail

          rm -rf .vercel

          vercel link --yes --token="$VERCEL_TOKEN"
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

          DEPLOY_ARGS=(deploy . --prod --yes --token="$VERCEL_TOKEN")
          DEPLOY_ARGS+=(--build-env "VITE_SUPABASE_URL=$SUPABASE_URL")
          DEPLOY_ARGS+=(--build-env "VITE_SUPABASE_ANON_KEY=$SUPABASE_KEY")
          DEPLOY_ARGS+=(--build-env "VITE_API_BASE_URL=$PROD_API_URL")
          [ -n "$GOOGLE_MAPS_API_KEY" ] && DEPLOY_ARGS+=(--build-env "VITE_GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY")

          DEPLOY_OUTPUT=$(vercel "${DEPLOY_ARGS[@]}")
          URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -1)

          if [ -z "${URL:-}" ]; then
            echo "::error::Unable to determine the production frontend deployment URL."
            exit 1
          fi

          echo "deployment_url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Production frontend deployed to ${URL}"

      - name: Create Sentry release (production)
        if: success()
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          if [ -z "${SENTRY_AUTH_TOKEN:-}" ] || [ -z "${SENTRY_ORG:-}" ] || [ -z "${SENTRY_PROJECT:-}" ]; then
            echo "::notice::Sentry release configuration is incomplete; skipping release creation."
            exit 0
          fi

          npm install -g @sentry/cli --silent
          sentry-cli releases new "${VERSION}" --org="$SENTRY_ORG" --project="$SENTRY_PROJECT"
          sentry-cli releases set-commits "${VERSION}" --auto --org="$SENTRY_ORG" --project="$SENTRY_PROJECT"
          sentry-cli releases deploys "${VERSION}" new --env production --org="$SENTRY_ORG" --project="$SENTRY_PROJECT"
          sentry-cli releases finalize "${VERSION}" --org="$SENTRY_ORG" --project="$SENTRY_PROJECT"

  production-backend:
    name: Production - Backend
    runs-on: ubuntu-latest
    needs: [prepare, production-backup]
    if: ${{ needs.prepare.outputs.environment == 'production' && needs.prepare.outputs.should_deploy == 'true' }}
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Checkout source revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate production backend configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_BACKEND_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          required_vars=(
            VERCEL_TOKEN
            VERCEL_ORG_ID
            VERCEL_BACKEND_PROJECT_ID
            DATABASE_URL
            SUPABASE_URL
            SUPABASE_KEY
            SUPABASE_SERVICE_ROLE_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error::${var_name} is required for the production backend deployment."
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@a0853c245d4dbd38b7f14a2ab0dcbda9a941144d # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g "vercel@${VERCEL_CLI_VERSION}"

      - name: Authenticate Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel whoami --token="$VERCEL_TOKEN"

      - name: Deploy backend to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          rm -rf .vercel
          vercel link --yes --token="$VERCEL_TOKEN"
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

          DEPLOY_ARGS=(deploy . --prod --yes --token="$VERCEL_TOKEN")
          DEPLOY_ARGS+=(-e "DATABASE_URL=$DATABASE_URL")
          DEPLOY_ARGS+=(-e "SUPABASE_URL=$SUPABASE_URL")
          DEPLOY_ARGS+=(-e "SUPABASE_KEY=$SUPABASE_KEY")
          DEPLOY_ARGS+=(-e "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY")

          vercel "${DEPLOY_ARGS[@]}"

  production-verify:
    name: Production - Verification
    runs-on: ubuntu-latest
    needs: [prepare, production-frontend, production-backend]
    if: ${{ always() && needs.prepare.outputs.environment == 'production' && needs.prepare.outputs.should_deploy == 'true' }}
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@a0853c245d4dbd38b7f14a2ab0dcbda9a941144d # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g "vercel@${VERCEL_CLI_VERSION}"

      - name: Fail when a production deployment job fails
        if: ${{ needs.production-frontend.result != 'success' || needs.production-backend.result != 'success' }}
        run: |
          echo "::error::At least one production deployment job failed."
          exit 1

      - name: Smoke tests
        if: ${{ needs.production-frontend.result == 'success' && needs.production-backend.result == 'success' }}
        env:
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          PROD_FRONTEND_URL: ${{ vars.PROD_FRONTEND_URL }}
          DEPLOYMENT_URL: ${{ needs.production-frontend.outputs.deployment_url }}
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_API_URL:-}" ]; then
            echo "::error::PROD_API_URL is required for production smoke tests."
            exit 1
          fi

          FAILED=0
          MAX_ATTEMPTS=5
          BACKEND_OK=false

          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            START_MS=$(date +%s%3N)
            if curl --fail --show-error --silent --max-time 15 "${PROD_API_URL}/health/ready"; then
              END_MS=$(date +%s%3N)
              RESPONSE_TIME=$((END_MS - START_MS))
              echo "Backend health check passed in ${RESPONSE_TIME}ms"
              [ "$RESPONSE_TIME" -gt 5000 ] && echo "::warning::Backend response time ${RESPONSE_TIME}ms exceeded the 5000ms threshold."
              BACKEND_OK=true
              break
            fi
            [ "$i" -lt "$MAX_ATTEMPTS" ] && sleep 15
          done

          if [ "$BACKEND_OK" != "true" ]; then
            echo "::error::Production backend health check failed after ${MAX_ATTEMPTS} attempts."
            FAILED=1
          fi

          FRONTEND_URL="${PROD_FRONTEND_URL:-$DEPLOYMENT_URL}"
          if [ -n "${FRONTEND_URL:-}" ]; then
            MAX_FRONTEND_ATTEMPTS=3
            FRONTEND_OK=false
            CURL_ARGS=(-s -o /dev/null -w "%{http_code}" --max-time 15)
            [ -n "${VERCEL_PROTECTION_BYPASS:-}" ] && CURL_ARGS+=(-H "x-vercel-protection-bypass: $VERCEL_PROTECTION_BYPASS")

            for i in $(seq 1 "$MAX_FRONTEND_ATTEMPTS"); do
              HTTP_STATUS=$(curl "${CURL_ARGS[@]}" "${FRONTEND_URL}")
              if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
                echo "Frontend health check passed with HTTP ${HTTP_STATUS}"
                FRONTEND_OK=true
                break
              fi
              [ "$i" -lt "$MAX_FRONTEND_ATTEMPTS" ] && sleep 10
            done

            if [ "$FRONTEND_OK" != "true" ]; then
              echo "::error::Production frontend health check failed with HTTP ${HTTP_STATUS}."
              FAILED=1
            fi
          else
            echo "::warning::No production frontend URL is available; skipping frontend smoke test."
          fi

          [ "$FAILED" -eq 0 ] || exit 1

      - name: Roll back Vercel deployments on failure
        if: failure()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_FRONTEND_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_BACKEND_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ]; then
            echo "::warning::Vercel credentials are incomplete; skipping rollback."
            exit 0
          fi

          if [ -n "${VERCEL_FRONTEND_PROJECT_ID:-}" ]; then
            VERCEL_PROJECT_ID="$VERCEL_FRONTEND_PROJECT_ID" vercel rollback --yes --token="$VERCEL_TOKEN" || \
              echo "::warning::Frontend rollback failed."
          fi

          if [ -n "${VERCEL_BACKEND_PROJECT_ID:-}" ]; then
            VERCEL_PROJECT_ID="$VERCEL_BACKEND_PROJECT_ID" vercel rollback --yes --token="$VERCEL_TOKEN" || \
              echo "::warning::Backend rollback failed."
          fi

      - name: Notify deployment result
        if: always()
        env:
          FRONTEND_URL: ${{ needs.production-frontend.outputs.deployment_url }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          SOURCE_BRANCH: ${{ needs.prepare.outputs.branch }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
        run: |
          set +e

          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="Production deployment successful"
            COLOR_SLACK="good"
            COLOR_DISCORD=5763719
          else
            TITLE="Production deployment failed"
            COLOR_SLACK="danger"
            COLOR_DISCORD=15548997
          fi

          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"${TITLE}\",\"attachments\":[{\"color\":\"${COLOR_SLACK}\",\"fields\":[{\"title\":\"Environment\",\"value\":\"production\",\"short\":true},{\"title\":\"Version\",\"value\":\"${VERSION}\",\"short\":true},{\"title\":\"Branch\",\"value\":\"${SOURCE_BRANCH}\",\"short\":true},{\"title\":\"Commit\",\"value\":\"${SOURCE_SHA}\",\"short\":false},{\"title\":\"URL\",\"value\":\"${FRONTEND_URL}\",\"short\":false},{\"title\":\"Run\",\"value\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"short\":false}]}]}" \
              >/dev/null 2>&1 || true
          fi

          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            curl -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"embeds\":[{\"title\":\"${TITLE}\",\"color\":${COLOR_DISCORD},\"fields\":[{\"name\":\"Environment\",\"value\":\"production\",\"inline\":true},{\"name\":\"Version\",\"value\":\"${VERSION}\",\"inline\":true},{\"name\":\"Branch\",\"value\":\"${SOURCE_BRANCH}\",\"inline\":true},{\"name\":\"Commit\",\"value\":\"${SOURCE_SHA}\"},{\"name\":\"URL\",\"value\":\"${FRONTEND_URL}\"},{\"name\":\"Run\",\"value\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}]}" \
              >/dev/null 2>&1 || true
          fi

  production-record:
    name: Production - Deployment Record
    runs-on: ubuntu-latest
    needs: [prepare, production-verify]
    if: ${{ needs.prepare.outputs.environment == 'production' && needs.prepare.outputs.should_deploy == 'true' && needs.production-verify.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout released revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.prepare.outputs.source_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Create deployment audit tag
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          SOURCE_BRANCH: ${{ needs.prepare.outputs.branch }}
        run: |
          set -euo pipefail

          TAG_NAME="deploy-${VERSION}"

          if git ls-remote --exit-code --tags origin "${TAG_NAME}" >/dev/null 2>&1; then
            echo "::notice::Deployment tag ${TAG_NAME} already exists; skipping tag creation."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${TAG_NAME}" "${SOURCE_SHA}" -m "Production deployment ${VERSION} from ${SOURCE_BRANCH}"
          git push origin "refs/tags/${TAG_NAME}"
          echo "Created deployment tag ${TAG_NAME} for ${SOURCE_SHA}"

  summary-staging:
    name: Deployment Summary (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [prepare, staging-frontend, staging-verify]
    if: ${{ always() && needs.prepare.outputs.environment == 'staging' && needs.prepare.outputs.should_deploy == 'true' }}
    steps:
      - name: Create staging deployment summary
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          FRONTEND_URL: ${{ needs.staging-frontend.outputs.deployment_url }}
          STAGING_RESULT: ${{ needs.staging-verify.result }}
          START_TIME: ${{ needs.prepare.outputs.start_time }}
          SOURCE_BRANCH: ${{ needs.prepare.outputs.branch }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          SOURCE_RUN_URL: ${{ needs.prepare.outputs.source_run_url }}
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | staging |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | ${FRONTEND_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Branch | \`${SOURCE_BRANCH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Commit | \`${SOURCE_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Run | ${SOURCE_RUN_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          STATUS="Failed"
          [ "${STAGING_RESULT}" = "success" ] && STATUS="Success"
          [ "${STAGING_RESULT}" = "skipped" ] && STATUS="Skipped"
          echo "| Final Status | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${START_TIME:-}" ] && [ "$START_TIME" != "null" ]; then
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            if [ "$DURATION" -gt 0 ]; then
              MINUTES=$((DURATION / 60))
              SECONDS=$((DURATION % 60))
              echo "- Duration: ${MINUTES}m ${SECONDS}s" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

  summary-production:
    name: Deployment Summary (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [prepare, production-frontend, production-verify, production-record]
    if: ${{ always() && needs.prepare.outputs.environment == 'production' && needs.prepare.outputs.should_deploy == 'true' }}
    steps:
      - name: Create production deployment summary
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          FRONTEND_URL: ${{ needs.production-frontend.outputs.deployment_url }}
          PRODUCTION_RESULT: ${{ needs.production-verify.result }}
          RECORD_RESULT: ${{ needs.production-record.result }}
          START_TIME: ${{ needs.prepare.outputs.start_time }}
          SOURCE_BRANCH: ${{ needs.prepare.outputs.branch }}
          SOURCE_SHA: ${{ needs.prepare.outputs.source_sha }}
          SOURCE_RUN_URL: ${{ needs.prepare.outputs.source_run_url }}
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | production |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | ${FRONTEND_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Branch | \`${SOURCE_BRANCH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Commit | \`${SOURCE_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Run | ${SOURCE_RUN_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          STATUS="Failed"
          [ "${PRODUCTION_RESULT}" = "success" ] && STATUS="Success"
          [ "${PRODUCTION_RESULT}" = "skipped" ] && STATUS="Skipped"
          echo "| Verification | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"

          RECORD_STATUS="Failed"
          [ "${RECORD_RESULT}" = "success" ] && RECORD_STATUS="Success"
          [ "${RECORD_RESULT}" = "skipped" ] && RECORD_STATUS="Skipped"
          echo "| Deployment Record | ${RECORD_STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${START_TIME:-}" ] && [ "$START_TIME" != "null" ]; then
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            if [ "$DURATION" -gt 0 ]; then
              MINUTES=$((DURATION / 60))
              SECONDS=$((DURATION % 60))
              echo "- Duration: ${MINUTES}m ${SECONDS}s" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
