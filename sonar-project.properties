# Project Metadata
sonar.projectKey=purrfectspots
sonar.projectName=Purrfect Spots
sonar.projectVersion=1.0.0

# SonarQube Server URL (Default local)
sonar.host.url=http://localhost:9000

# Source & Test Paths
sonar.sources=backend,frontend/src
sonar.tests=backend/tests,frontend/tests
sonar.sourceEncoding=UTF-8

# Exclusions
# Ignore binary files, node_modules, dist, and IDE configs
sonar.exclusions=backend/tests/**,frontend/tests/**,**/node_modules/**,**/dist/**,**/__pycache__/**,**/*.pyc,**/test-results/**,**/playwright-report/**,**/htmlcov/**,**/.venv/**,**/venv/**,**/.sonar/**,**/.git/**,**/.husky/**,**/.vscode/**,backend/mypy_results.txt,frontend/lint_results.txt,sonar_issues.json,debug.log

# Language-specific configurations
# Python (Backend) - Python 3.12+ (ตาม coding.md)
sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml

# JavaScript/TypeScript (Frontend)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=frontend/tsconfig.json