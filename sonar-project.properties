# SonarCloud project metadata
sonar.projectKey=ChaLconner_purrfect-spots
sonar.organization=chalconner
sonar.projectName=Purrfect Spots
sonar.projectVersion=3.1.0

# Source, test, and encoding paths
sonar.sources=backend,frontend/src
sonar.tests=backend/tests,frontend/tests
sonar.sourceEncoding=UTF-8

# Exclusions
# Ignore generated files, dependencies, local tooling, logs, and docs.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/__pycache__/**,**/*.pyc,**/test-results/**,**/playwright-report/**,**/htmlcov/**,**/.venv/**,**/venv/**,**/.sonar/**,**/.git/**,**/.husky/**,**/.vscode/**,**/*.md,**/*.log,backend/mypy_results.txt,frontend/lint_results.txt,sonar_issues.json

# Language-specific configuration
sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=frontend/tsconfig.json
